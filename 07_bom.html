<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOM</title>
</head>
<body>
    <div style = "background-color: aquamarine; height: 1000vh"></div>
    <script>
        console.log(this);
        //현재 스코프 범위를 감싸고 있는 객체
        console.log(globalThis); //명시적 전역 객체
        function f1(){
            console.log("f1", this);
        }
        const f2 = function (){
            console.log("f2", this);
        }
        const f3 = () => {
            console.log("f3", this);
        }
        f1();
        f2();
        f3();
        setTimeout(
            () => console.log("setTimeOut"),
            1000
        );
        // setInterval(() => {
        //     console.log("setInterval"),
        //     1000
        // }); 
        //window
        //순수하게 보여지는 곳
        console.log(window.innerWidth);
        console.log(window.innerHeight);
        //전체
        console.log(window.outerWidth);
        console.log(window.outerHeight);
        //scroll 관련도 있음
        console.log(window.scrollX);
        console.log(window.scrollY);
        
        


    </script>
</body>
</html>
