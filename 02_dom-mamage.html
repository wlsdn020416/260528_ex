<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM CRUD</title>
</head>
<body>
    <div>
        <button onclick="addBOX()">생성</button>
        <h1>추가된 요소</h1>
        <div id="container">
        </div>
    </div>
    <script>
        const container = document.querySelector("#container");
        function addBOX(){
            // console.log("박스를 추가합니다");
            const content = prompt("추가할 내용을 넣어주세요");
            console.log(content);
            const box = document.createElement("p");
            // box.innerHTML = `<button onclick="alert('해킹 당했습니다!')">부자가 되는 법, 꼭 확인하세요!</button>`;
            box.textContent = content; // 랜더링 상관없이 바로 집어넣는 기능
            container.append(box);
        }
    </script>
</body>
</html>
